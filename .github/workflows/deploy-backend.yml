name: Deploy backend (Render)

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "render.yaml"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./cmd/server

      - name: Trigger Render deploy
        id: trigger
        working-directory: .
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          set -euo pipefail
          response=$(curl -sS -X POST \
            -H "Authorization: Bearer $RENDER_API_KEY" \
            -H "Accept: application/json" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys")
          echo "$response"
          deploy_id=$(echo "$response" | jq -er '.id')
          echo "deploy_id=$deploy_id" >> "$GITHUB_OUTPUT"
          echo "Triggered Render deploy $deploy_id"

      - name: Wait for Render deploy to finish
        working-directory: .
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
          DEPLOY_ID: ${{ steps.trigger.outputs.deploy_id }}
        run: |
          set -euo pipefail
          deadline=$(( $(date +%s) + 15 * 60 ))
          while :; do
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "Timed out waiting for Render deploy $DEPLOY_ID"
              exit 1
            fi
            status=$(curl -sS \
              -H "Authorization: Bearer $RENDER_API_KEY" \
              -H "Accept: application/json" \
              "https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys/$DEPLOY_ID" \
              | jq -r '.status')
            echo "deploy=$DEPLOY_ID status=$status"
            case "$status" in
              live)
                echo "Deploy succeeded"
                exit 0
                ;;
              build_failed|update_failed|canceled|deactivated|pre_deploy_failed)
                echo "Deploy failed with status: $status"
                exit 1
                ;;
              created|build_in_progress|update_in_progress|pre_deploy_in_progress|queued)
                sleep 15
                ;;
              *)
                echo "Unknown status: $status — continuing to poll"
                sleep 15
                ;;
            esac
          done
