services:
  postgres:
    image: postgres:16-alpine
    container_name: fitproof_db
    environment:
      POSTGRES_USER: fitproof_user
      POSTGRES_PASSWORD: fitproof_password
      POSTGRES_DB: fitproof
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitproof_user -d fitproof"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      APP_PORT: "8080"
      DATABASE_URL: pgx5://fitproof_user:fitproof_password@postgres:5432/fitproof
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_TTL: 15m
      JWT_REFRESH_TOKEN_TTL: 168h
      MIGRATIONS_PATH: ./migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://app:8080
    depends_on:
      - app
    restart: unless-stopped

volumes:
  postgres_data:
