version: "2"
sql:
  - engine: "postgresql"
    schema: "./migrations"
    queries: "./internal/repositories/queries"
    gen:
      go:
        package: "db"
        out: "./internal/repositories/db"
        sql_package: "pgx/v5"
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "numeric"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Numeric"
          - db_type: "date"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Date"
